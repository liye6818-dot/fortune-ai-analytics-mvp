<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>财神爷88 管理后台</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --panel: #fff;
        --text: #17212b;
        --muted: #657487;
        --line: #d8dee6;
        --primary: #1f6fe5;
        --danger: #c62828;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      }
      header, main {
        width: min(1180px, calc(100% - 28px));
        margin: 0 auto;
      }
      header {
        padding: 24px 0 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      h1, h2 { margin: 0; }
      h1 { font-size: 28px; }
      h2 { font-size: 20px; }
      .panel {
        margin-bottom: 14px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      input, select, textarea, button {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 9px;
        font: inherit;
      }
      textarea { min-height: 70px; resize: vertical; }
      button {
        border-color: var(--primary);
        background: var(--primary);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      button.secondary { background: #fff; color: var(--primary); }
      button.danger { border-color: var(--danger); background: var(--danger); }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 9px 8px;
        text-align: left;
        vertical-align: top;
      }
      th { color: var(--muted); background: #f9fafc; }
      .actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .actions button { width: auto; min-height: 32px; padding: 4px 8px; }
      .hidden { display: none; }
      .muted { color: var(--muted); }
      .status {
        min-height: 22px;
        color: var(--muted);
      }
      @media (max-width: 760px) {
        header { align-items: flex-start; flex-direction: column; }
        .grid { grid-template-columns: 1fr; }
        .table-wrap { overflow-x: auto; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>财神爷88 管理后台</h1>
        <div class="muted">安全码、项目、联机、日志</div>
      </div>
      <button id="refreshBtn" class="secondary hidden" type="button">刷新</button>
    </header>

    <main>
      <section id="loginPanel" class="panel">
        <h2>管理员登录</h2>
        <div class="grid" style="margin-top:12px;">
          <input id="username" placeholder="管理员账号" autocomplete="username" />
          <input id="password" placeholder="密码" type="password" autocomplete="current-password" />
          <button id="loginBtn" type="button">登录</button>
        </div>
        <p id="loginStatus" class="status"></p>
      </section>

      <section id="dashboard" class="hidden">
        <section class="panel">
          <h2>单机访问码</h2>
          <div class="grid" style="margin-top:12px;">
            <input id="standaloneNote" placeholder="备注，例如客户名" />
            <select id="standaloneDuration">
              <option value="365">365天</option>
              <option value="180">180天</option>
              <option value="90">90天</option>
              <option value="30">30天</option>
              <option value="permanent">永久</option>
              <option value="custom">自定义到期</option>
            </select>
            <input id="standaloneCustomExpiresAt" placeholder="自定义到期 2027-07-03" />
            <button id="createStandaloneKeyBtn" type="button">生成单机访问码</button>
          </div>
          <p id="standaloneStatus" class="status"></p>
          <div class="grid" style="grid-template-columns: 1fr auto; margin-top:12px;">
            <input id="standaloneSearch" placeholder="搜索备注、访问码预览、设备号、IP" />
            <button id="standaloneSearchBtn" type="button">搜索</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>备注</th>
                  <th>访问码</th>
                  <th>状态</th>
                  <th>到期</th>
                  <th>绑定设备</th>
                  <th>最后登录</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="standaloneRows"></tbody>
            </table>
          </div>
        </section>
        <section class="panel">
          <h2>生成联机访问码</h2>
          <div class="grid" style="margin-top:12px;">
            <input id="customerName" placeholder="客户名称" />
            <input id="contact" placeholder="联系方式（可选）" />
            <select id="duration">
              <option value="365">365天</option>
              <option value="180">180天</option>
              <option value="90">90天</option>
              <option value="30">30天</option>
              <option value="permanent">永久</option>
              <option value="custom">自定义到期</option>
            </select>
            <input id="customExpiresAt" placeholder="自定义到期 2027-07-03" />
            <input id="remark" placeholder="备注" />
            <button id="createCodeBtn" type="button">生成联机访问码</button>
          </div>
          <p id="createStatus" class="status"></p>
        </section>

        <section class="panel">
          <h2>联机访问码</h2>
          <div class="grid" style="grid-template-columns: 1fr auto auto; margin-top:12px;">
            <input id="search" placeholder="搜索客户、联系方式、备注、访问码预览" />
            <button id="searchBtn" type="button">搜索</button>
            <button id="kickAllBtn" class="danger" type="button">全部强制下机</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>客户</th>
                  <th>访问码</th>
                  <th>到期</th>
                  <th>状态</th>
                  <th>登录</th>
                  <th>在线设备</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="codeRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>项目</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>名称</th>
                  <th>客户</th>
                  <th>模式</th>
                  <th>在线</th>
                  <th>创建时间</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="projectRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <h2>日志</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>动作</th>
                  <th>角色</th>
                  <th>对象</th>
                  <th>IP</th>
                </tr>
              </thead>
              <tbody id="logRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script>
      let token = "";
      let csrfToken = "";
      const API_BASE_URL = window.location.protocol === "file:" ? "http://127.0.0.1:3000" : "";

      const $ = (id) => document.getElementById(id);
      const api = async (url, options = {}) => {
        const headers = { "content-type": "application/json", ...(options.headers || {}) };
        if (token) headers.authorization = `Bearer ${token}`;
        if (csrfToken) headers["x-csrf-token"] = csrfToken;
        const response = await fetch(`${API_BASE_URL}${url}`, { ...options, headers });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(body.error || "request_failed");
        return body;
      };

      function fmt(value) {
        return value ? new Date(value).toLocaleString() : "-";
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      }

      async function login() {
        $("loginStatus").textContent = "登录中...";
        try {
          const result = await api("/api/admin/login", {
            method: "POST",
            body: JSON.stringify({ username: $("username").value, password: $("password").value })
          });
          token = result.token;
          csrfToken = result.csrfToken;
          $("loginPanel").classList.add("hidden");
          $("dashboard").classList.remove("hidden");
          $("refreshBtn").classList.remove("hidden");
          await loadAll();
        } catch (error) {
          $("loginStatus").textContent = error.message;
        }
      }

      async function createCode() {
        $("createStatus").textContent = "保存中...";
        try {
          const result = await api("/api/admin/security-codes", {
            method: "POST",
            body: JSON.stringify({
              customerName: $("customerName").value,
              contact: $("contact").value,
              remark: $("remark").value,
              duration: $("duration").value,
              customExpiresAt: $("customExpiresAt").value || null
            })
          });
          $("createStatus").textContent = `已生成联机访问码：${result.code}`;
          await loadCodes();
        } catch (error) {
          $("createStatus").textContent = error.message;
        }
      }

      function standaloneStatusText(status) {
        return {
          unbound: "未绑定",
          bound: "已绑定",
          disabled: "已禁用",
          expired: "已过期",
          deleted: "已删除"
        }[status] || status || "-";
      }

      async function createStandaloneKey() {
        $("standaloneStatus").textContent = "保存中...";
        try {
          const result = await api("/api/admin/standalone-keys", {
            method: "POST",
            body: JSON.stringify({
              note: $("standaloneNote").value,
              duration: $("standaloneDuration").value,
              customExpiresAt: $("standaloneCustomExpiresAt").value || null
            })
          });
          $("standaloneStatus").textContent = `已生成单机访问码：${result.key}`;
          await loadStandaloneKeys();
        } catch (error) {
          $("standaloneStatus").textContent = error.message;
        }
      }

      async function loadStandaloneKeys() {
        const data = await api(`/api/admin/standalone-keys?q=${encodeURIComponent($("standaloneSearch").value)}`);
        $("standaloneRows").innerHTML = data.items.map((item) => `
          <tr>
            <td><b>${esc(item.note || "-")}</b></td>
            <td>${esc(item.keyPreview)}</td>
            <td>${standaloneStatusText(item.status)}</td>
            <td>${item.permanent ? "永久" : fmt(item.expiresAt)}</td>
            <td>${esc(item.boundDeviceId || "未绑定")}<br><span class="muted">${fmt(item.boundAt)}</span></td>
            <td>${fmt(item.lastLoginAt)}<br><span class="muted">${esc(item.lastLoginIp || "")}</span></td>
            <td>
              <div class="actions">
                <button type="button" onclick="toggleStandaloneKey('${item.id}', ${!item.enabled})">${item.enabled ? "禁用" : "启用"}</button>
                <button type="button" onclick="resetStandaloneDevice('${item.id}')">重置设备</button>
                <button class="danger" type="button" onclick="deleteStandaloneKey('${item.id}')">删除</button>
              </div>
            </td>
          </tr>
        `).join("");
      }

      async function toggleStandaloneKey(id, enabled) {
        await api(`/api/admin/standalone-keys/${id}`, { method: "PATCH", body: JSON.stringify({ enabled }) });
        await loadStandaloneKeys();
      }

      async function resetStandaloneDevice(id) {
        if (!confirm("确认重置设备绑定？重置后下一台设备可重新绑定。")) return;
        await api(`/api/admin/standalone-keys/${id}/reset-device`, { method: "POST", body: JSON.stringify({}) });
        await loadStandaloneKeys();
      }

      async function deleteStandaloneKey(id) {
        if (!confirm("确认删除这个单机访问码？")) return;
        await api(`/api/admin/standalone-keys/${id}`, { method: "DELETE" });
        await loadStandaloneKeys();
      }

      async function loadCodes() {
        const data = await api(`/api/admin/security-codes?q=${encodeURIComponent($("search").value)}`);
        $("codeRows").innerHTML = data.items.map((item) => `
          <tr>
            <td><b>${item.customerName}</b><br><span class="muted">${item.contact || ""}</span></td>
            <td>${item.codePreview}</td>
            <td>${item.permanent ? "永久" : fmt(item.expiresAt)}</td>
            <td>${item.enabled ? "启用" : "禁用"}</td>
            <td>${item.loginCount}<br><span class="muted">${fmt(item.lastLoginAt)}</span></td>
            <td>${Number(item.onlineCount || 0)} 台<br><span class="muted">${item.online ? "在线" : "离线"}</span></td>
            <td>
              <div class="actions">
                <button type="button" onclick="renew('${item.id}')">续期365</button>
                <button type="button" onclick="toggleCode('${item.id}', ${!item.enabled})">${item.enabled ? "禁用" : "启用"}</button>
                <button type="button" onclick="kickCode('${item.id}')">强制下机</button>
                <button class="danger" type="button" onclick="deleteCode('${item.id}')">删除</button>
              </div>
            </td>
          </tr>
        `).join("");
      }

      async function renew(id) {
        await api(`/api/admin/security-codes/${id}/renew`, { method: "POST", body: JSON.stringify({ duration: "365" }) });
        await loadCodes();
      }

      async function toggleCode(id, enabled) {
        await api(`/api/admin/security-codes/${id}`, { method: "PATCH", body: JSON.stringify({ enabled }) });
        await loadCodes();
      }

      async function kickCode(id) {
        if (!confirm("确认强制该访问码所有在线设备下机？")) return;
        await api(`/api/admin/security-codes/${id}/kick`, { method: "POST", body: JSON.stringify({}) });
        await loadCodes();
        await loadProjects();
      }

      async function kickAllCodes() {
        if (!confirm("确认强制所有联机设备下机？")) return;
        await api("/api/admin/security-codes/kick-all", { method: "POST", body: JSON.stringify({}) });
        await loadCodes();
        await loadProjects();
      }

      async function deleteCode(id) {
        if (!confirm("确认删除？数据会逻辑删除并保留日志。")) return;
        await api(`/api/admin/security-codes/${id}`, { method: "DELETE" });
        await loadCodes();
      }

      async function loadProjects() {
        const data = await api("/api/admin/projects");
        $("projectRows").innerHTML = data.items.map((item) => `
          <tr>
            <td>${item.name}</td>
            <td>${item.customer_name}</td>
            <td>${item.mode === "collaboration" ? "联合" : "单机"}</td>
            <td>${item.online_count}</td>
            <td>${fmt(item.created_at)}</td>
            <td>${item.status}</td>
          </tr>
        `).join("");
      }

      async function loadLogs() {
        const data = await api("/api/admin/logs");
        $("logRows").innerHTML = data.items.slice(0, 80).map((item) => `
          <tr>
            <td>${fmt(item.created_at)}</td>
            <td>${item.action}</td>
            <td>${item.actor_type}</td>
            <td>${item.entity_type || ""}<br><span class="muted">${item.entity_id || ""}</span></td>
            <td>${item.ip_address || ""}</td>
          </tr>
        `).join("");
      }

      async function loadAll() {
        await Promise.all([loadStandaloneKeys(), loadCodes(), loadProjects(), loadLogs()]);
      }

      $("loginBtn").onclick = login;
      $("createStandaloneKeyBtn").onclick = createStandaloneKey;
      $("standaloneSearchBtn").onclick = loadStandaloneKeys;
      $("createCodeBtn").onclick = createCode;
      $("searchBtn").onclick = loadCodes;
      $("kickAllBtn").onclick = kickAllCodes;
      $("refreshBtn").onclick = loadAll;
    </script>
  </body>
</html>
